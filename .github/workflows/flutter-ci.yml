name: Flutter CI

on:
  pull_request:
    branches:
      - main
      - development
  push:
    branches:
      - main
      - development

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create CI dotenv asset
        run: |
          printf "SUPABASE_URL=https://example.supabase.co\nSUPABASE_ANON_KEY=example-anon-key\n" > .env

      - name: Run project checks
        run: dart run tool/check.dart

      - name: Ensure generated files are committed
        run: git diff --exit-code
