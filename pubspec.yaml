version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  freezed_annotation: ^3.1.0
  image_picker: ^1.2.2
